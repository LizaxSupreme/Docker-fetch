name: PyTorch Direct Downloader

on: workflow_dispatch

jobs:
  download-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Download WHL Files via Direct URL
        run: |
          # 使用强制转义的 URL 下载真正的 Linux .whl 文件
          # 1. Torch 2.11.0 (约 2GB)
          wget -O torch-2.11.0+cu130-cp311-cp311-linux_x86_64.whl "https://pytorch.org"
          
          # 2. Torchaudio 2.11.0
          wget -O torchaudio-2.11.0+cu130-cp311-cp311-linux_x86_64.whl "https://pytorch.org"
          
          # 3. Torchvision 0.26.0
          wget -O torchvision-0.26.0+cu130-cp311-cp311-linux_x86_64.whl "https://pytorch.org"

          # 验证文件大小 (必须是几百 MB 或 GB 级别)
          ls -lh *.whl

      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-linux-bundle
          path: ./*.whl
          retention-days: 1
