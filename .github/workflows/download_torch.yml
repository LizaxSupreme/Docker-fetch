name: PyTorch Linux Bundle Fetcher

on: 
  workflow_dispatch: 

jobs:
  download-torch-bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux WHL Bundle
        run: |
          # 核心路径：https://pytorch.org
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          echo "Starting downloads..."

          # 1. 下载 Torch (注意：域名/路径/文件名 之间都有 / 隔开)
          wget --user-agent="$UA" -O torch-2.11.0+cu130-cp311-cp311-linux_x86_64.whl "https://download.pytorch.org/torch-2.11.0%2Bcu130-cp311-cp311-linux_x86_64.whl"
          
          # 2. 下载 Torchaudio
          wget --user-agent="$UA" -O torchaudio-2.11.0+cu130-cp311-cp311-linux_x86_64.whl "https://download.pytorch.org/torchaudio-2.11.0%2Bcu130-cp311-cp311-linux_x86_64.whl"
          
          # 3. 下载 Torchvision
          wget --user-agent="$UA" -O torchvision-0.26.0+cu130-cp311-cp311-linux_x86_64.whl "https://download.pytorch.org/torchvision-0.26.0%2Bcu130-cp311-cp311-linux_x86_64.whl"

          echo "Verifying file sizes..."
          ls -lh *.whl

      - name: Upload Bundle to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-linux-bundle
          path: "./*.whl"
          retention-days: 1
